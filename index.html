<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Arlu" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>Arlu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --bg: #0a0a0a; --bg2: #141414; --bg3: #1c1c1c; --bg4: #242424;
  --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.12);
  --text: #f0ede8; --text2: #8a8580; --text3: #4a4845;
  --blue: #3b82f6; --orange: #f97316; --green: #22c55e; --red: #ef4444; --amber: #f59e0b; --purple: #a855f7;
  --font-display: 'Syne', sans-serif; --font-body: 'DM Sans', sans-serif;
  --r: 12px; --r-sm: 8px;
  --safe-top: env(safe-area-inset-top, 0px); --safe-bottom: env(safe-area-inset-bottom, 0px);
}
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-body); font-size: 15px; line-height: 1.5; overflow: hidden; }

/* SPLASH */
.splash { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; z-index: 100; animation: splashOut 0.4s ease 1.2s forwards; }
@keyframes splashOut { to { opacity: 0; pointer-events: none; } }
.splash-logo { display: flex; align-items: center; gap: 10px; animation: fadeUp 0.5s ease 0.1s both; }
.splash-logo span { font-family: var(--font-display); font-size: 32px; font-weight: 800; letter-spacing: -1px; }
.splash-sub { font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text3); animation: fadeUp 0.5s ease 0.2s both; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

/* AUTH */
.auth-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; padding: 24px; z-index: 90; overflow-y: auto; }
.auth-inner { width: 100%; max-width: 340px; animation: fadeUp 0.4s ease both; padding: 20px 0; }
.auth-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.auth-logo h1 { font-family: var(--font-display); font-size: 28px; font-weight: 800; letter-spacing: -1px; }
.auth-tagline { font-size: 13px; color: var(--text2); margin-bottom: 24px; }
.user-cards { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
.user-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r); padding: 14px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: background 0.15s, border-color 0.15s; }
.user-card:hover { background: var(--bg3); border-color: var(--border2); }
.user-card-avatar { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-size: 18px; font-weight: 700; color: white; flex-shrink: 0; overflow: hidden; }
.user-card-info { flex: 1; }
.user-card-name { font-family: var(--font-display); font-weight: 700; font-size: 16px; }
.user-card-role { font-size: 12px; color: var(--text2); }

/* PASSWORD SCREEN */
.password-step { animation: fadeUp 0.2s ease both; }
.password-step h3 { font-family: var(--font-display); font-weight: 700; font-size: 18px; margin-bottom: 16px; }
.password-back { background: none; border: none; color: var(--text2); cursor: pointer; font-family: var(--font-body); font-size: 13px; display: flex; align-items: center; gap: 4px; margin-bottom: 20px; padding: 0; }
.password-back:hover { color: var(--text); }
.pw-input-wrap { position: relative; margin-bottom: 12px; }
.pw-input-wrap input { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--r-sm); padding: 12px 44px 12px 14px; color: var(--text); font-family: var(--font-body); font-size: 15px; outline: none; transition: border-color 0.15s; }
.pw-input-wrap input:focus { border-color: var(--border2); }
.pw-toggle { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text2); cursor: pointer; display: flex; align-items: center; }
.pw-error { font-size: 13px; color: var(--red); margin-bottom: 10px; min-height: 18px; }

/* APP SHELL */
.app { position: fixed; inset: 0; display: flex; flex-direction: column; background: var(--bg); }
.app-header { display: flex; align-items: center; justify-content: space-between; padding: calc(12px + var(--safe-top)) 16px 12px; background: var(--bg); border-bottom: 1px solid var(--border); flex-shrink: 0; }
.header-left { display: flex; align-items: center; gap: 8px; }
.header-title { font-family: var(--font-display); font-weight: 800; font-size: 20px; letter-spacing: -0.5px; }
.header-right { display: flex; align-items: center; gap: 8px; }
.header-user { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text2); cursor: pointer; }
.header-user:hover .header-username { color: var(--text); }
.small-avatar { width: 28px; height: 28px; border-radius: 50%; color: white; font-family: var(--font-display); font-weight: 700; font-size: 11px; display: flex; align-items: center; justify-content: center; overflow: hidden; flex-shrink: 0; }
.small-avatar img { width: 100%; height: 100%; object-fit: cover; }
.icon-btn { background: none; border: none; cursor: pointer; color: var(--text2); padding: 6px; border-radius: var(--r-sm); display: flex; align-items: center; transition: color 0.15s, background 0.15s; }
.icon-btn:hover { color: var(--text); background: var(--bg3); }

/* PROFILE PIC MODAL */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 24px; animation: fadeUp 0.2s ease both; }
.modal-box { background: var(--bg2); border: 1px solid var(--border2); border-radius: var(--r); padding: 24px; width: 100%; max-width: 320px; }
.modal-box h3 { font-family: var(--font-display); font-weight: 700; font-size: 18px; margin-bottom: 20px; }
.pic-upload-wrap { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-bottom: 20px; }
.pic-preview { width: 80px; height: 80px; border-radius: 50%; overflow: hidden; border: 2px dashed var(--border2); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: border-color 0.15s; }
.pic-preview:hover { border-color: var(--text2); }
.pic-upload-label { font-size: 12px; color: var(--text2); cursor: pointer; }
.pic-upload-label:hover { color: var(--text); }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; }

/* TABS */
.tab-nav { display: flex; background: var(--bg); border-bottom: 1px solid var(--border); flex-shrink: 0; }
.tab-btn { flex: 1; background: none; border: none; cursor: pointer; color: var(--text2); font-family: var(--font-body); font-size: 12px; font-weight: 500; padding: 10px 4px; display: flex; flex-direction: column; align-items: center; gap: 4px; border-bottom: 2px solid transparent; transition: color 0.15s, border-color 0.15s; }
.tab-btn.active { color: var(--text); border-bottom-color: var(--text); }
.tab-content { display: none; flex: 1; overflow: hidden; flex-direction: column; }
.tab-content.active { display: flex; }

/* CHAT */
.messages-list { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 4px; scroll-behavior: smooth; }
.messages-list::-webkit-scrollbar { display: none; }
.day-divider { text-align: center; margin: 8px 0; }
.day-divider span { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text3); }
.message-row { display: flex; gap: 8px; align-items: flex-end; }
.message-row.mine { flex-direction: row-reverse; }
.message-row.pop { animation: msgPop 0.3s cubic-bezier(0.34,1.56,0.64,1) both; }
@keyframes msgPop { from { opacity: 0; transform: scale(0.7) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
.msg-avatar { width: 26px; height: 26px; border-radius: 50%; font-family: var(--font-display); font-weight: 700; font-size: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: white; overflow: hidden; }
.msg-avatar img { width: 100%; height: 100%; object-fit: cover; }
.msg-meta { display: flex; flex-direction: column; align-items: flex-start; gap: 2px; max-width: 72%; }
.message-row.mine .msg-meta { align-items: flex-end; }
.msg-sender { font-size: 10px; color: var(--text3); padding: 0 4px; }
.msg-bubble { padding: 9px 13px; border-radius: 16px; font-size: 15px; line-height: 1.4; word-break: break-word; white-space: pre-wrap; min-width: 48px; }
.message-row:not(.mine) .msg-bubble { background: var(--bg3); color: var(--text); border-bottom-left-radius: 4px; }
.message-row.mine .msg-bubble { background: var(--text); color: var(--bg); border-bottom-right-radius: 4px; }
.msg-time { font-size: 10px; color: var(--text3); padding: 0 4px 2px; }
.msg-delete-btn { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 11px; padding: 2px 6px; border-radius: 4px; opacity: 0; transition: opacity 0.15s, color 0.15s; align-self: center; }
.message-row:hover .msg-delete-btn { opacity: 1; }
.msg-delete-btn:hover { color: var(--red); }
.msg-image { max-width: 200px; max-height: 200px; border-radius: 10px; display: block; margin-top: 4px; cursor: pointer; }
.img-preview-bar { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-top: 1px solid var(--border); background: var(--bg2); }
.img-preview-bar img { height: 48px; width: 48px; object-fit: cover; border-radius: 6px; border: 1px solid var(--border); }
.img-preview-bar button { background: none; border: none; color: var(--text2); cursor: pointer; font-size: 16px; padding: 4px 8px; }
.compose-bar { display: flex; align-items: center; gap: 8px; padding: 10px 12px calc(10px + var(--safe-bottom)); border-top: 1px solid var(--border); background: var(--bg); }
.attach-btn { background: none; border: none; cursor: pointer; color: var(--text2); padding: 6px; display: flex; align-items: center; flex-shrink: 0; transition: color 0.15s; }
.attach-btn:hover { color: var(--text); }
.compose-bar input { flex: 1; background: var(--bg3); border: 1px solid var(--border); border-radius: 22px; padding: 10px 16px; color: var(--text); font-family: var(--font-body); font-size: 15px; outline: none; transition: border-color 0.15s; }
.compose-bar input:focus { border-color: var(--border2); }
.compose-bar input::placeholder { color: var(--text3); }
.send-btn { width: 40px; height: 40px; border-radius: 50%; background: var(--text); border: none; cursor: pointer; color: var(--bg); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: transform 0.1s, opacity 0.15s; }
.send-btn:active { transform: scale(0.94); }
.send-btn:disabled { opacity: 0.3; cursor: default; }

/* TASKS */
.section-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 16px 8px; flex-shrink: 0; }
.section-header h2 { font-family: var(--font-display); font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
.add-btn { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--r-sm); padding: 7px 12px; color: var(--text); font-family: var(--font-body); font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 5px; transition: background 0.15s; }
.add-btn:hover { background: var(--bg4); }
.filter-pills { display: flex; gap: 6px; padding: 0 16px 12px; flex-shrink: 0; overflow-x: auto; }
.filter-pills::-webkit-scrollbar { display: none; }
.pill { background: var(--bg3); border: 1px solid var(--border); border-radius: 20px; padding: 5px 14px; font-size: 13px; color: var(--text2); cursor: pointer; white-space: nowrap; transition: background 0.15s, color 0.15s, border-color 0.15s; font-family: var(--font-body); }
.pill.active { background: var(--text); color: var(--bg); border-color: var(--text); }
.pill.priority-high.active { background: var(--red); border-color: var(--red); color: white; }
.pill.priority-medium.active { background: var(--amber); border-color: var(--amber); color: white; }
.pill.priority-low.active { background: var(--text3); border-color: var(--text3); color: white; }
.clear-done-bar { padding: 0 16px 10px; flex-shrink: 0; }
.clear-done-bar button { background: none; border: 1px solid rgba(239,68,68,0.3); border-radius: var(--r-sm); padding: 7px 14px; color: var(--red); font-family: var(--font-body); font-size: 13px; cursor: pointer; width: 100%; transition: background 0.15s; }
.clear-done-bar button:hover { background: rgba(239,68,68,0.08); }
.add-form { background: var(--bg2); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; flex-shrink: 0; animation: slideDown 0.2s ease both; }
@keyframes slideDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
.add-form input, .add-form select, .add-form textarea { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--r-sm); padding: 9px 12px; color: var(--text); font-family: var(--font-body); font-size: 14px; outline: none; width: 100%; transition: border-color 0.15s; }
.add-form input:focus, .add-form select:focus, .add-form textarea:focus { border-color: var(--border2); }
.add-form select option { background: var(--bg3); color: var(--text); }
.add-form textarea { resize: none; height: 72px; }
.add-form input[type="date"] { color-scheme: dark; }
.form-actions { display: flex; gap: 8px; justify-content: flex-end; }
.btn-ghost { background: none; border: 1px solid var(--border); border-radius: var(--r-sm); padding: 7px 16px; color: var(--text2); font-family: var(--font-body); font-size: 13px; cursor: pointer; transition: background 0.15s; }
.btn-ghost:hover { background: var(--bg3); }
.btn-primary { background: var(--text); border: none; border-radius: var(--r-sm); padding: 7px 16px; color: var(--bg); font-family: var(--font-body); font-size: 13px; font-weight: 500; cursor: pointer; transition: opacity 0.15s; }
.btn-primary:hover { opacity: 0.85; }
.todos-list { flex: 1; overflow-y: auto; padding: 0 16px 16px; display: flex; flex-direction: column; gap: 6px; }
.todos-list::-webkit-scrollbar { display: none; }
.empty-state { text-align: center; padding: 48px 0; color: var(--text3); font-size: 14px; }
.todo-item { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r); padding: 12px 14px; display: flex; flex-direction: column; gap: 0; animation: fadeUp 0.2s ease both; transition: background 0.15s; }
.todo-item:hover { background: var(--bg3); }
.todo-top { display: flex; align-items: flex-start; gap: 10px; }
.todo-check { width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid var(--border2); flex-shrink: 0; display: flex; align-items: center; justify-content: center; margin-top: 2px; cursor: pointer; transition: background 0.15s, border-color 0.15s; }
.todo-check.done { background: var(--green); border-color: var(--green); }
.todo-check.done svg { display: block; }
.todo-check svg { display: none; }
.todo-body { flex: 1; min-width: 0; }
.todo-title { font-size: 15px; line-height: 1.3; color: var(--text); }
.todo-item.is-done .todo-title { text-decoration: line-through; color: var(--text3); }
.todo-meta { display: flex; align-items: center; gap: 6px; margin-top: 5px; flex-wrap: wrap; }
.assignee-badge { font-size: 11px; color: var(--text2); }
.delegated-badge { font-size: 11px; color: var(--text3); }
.deadline-badge { font-size: 11px; color: var(--amber); }
.deadline-badge.overdue { color: var(--red); }
.priority-chip { font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; }
.priority-chip.high { background: rgba(239,68,68,0.15); color: var(--red); }
.priority-chip.medium { background: rgba(245,158,11,0.15); color: var(--amber); }
.priority-chip.low { background: var(--bg4); color: var(--text3); }
.todo-actions { display: flex; gap: 4px; flex-shrink: 0; }
.todo-action-btn { background: none; border: none; color: var(--text3); cursor: pointer; padding: 2px 4px; border-radius: 4px; display: flex; align-items: center; opacity: 0; transition: opacity 0.15s, color 0.15s; }
.todo-item:hover .todo-action-btn { opacity: 1; }
.todo-action-btn:hover { color: var(--text2); }
.todo-action-btn.del:hover { color: var(--red); }
.todo-instructions { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); animation: fadeUp 0.15s ease both; }
.todo-instructions p { font-size: 13px; color: var(--text2); line-height: 1.5; white-space: pre-wrap; }
.todo-instr-toggle { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 12px; font-family: var(--font-body); display: flex; align-items: center; gap: 4px; padding: 0; margin-top: 6px; transition: color 0.15s; }
.todo-instr-toggle:hover { color: var(--text2); }

/* PROJECTS */
.projects-list { flex: 1; overflow-y: auto; padding: 0 16px 16px; display: flex; flex-direction: column; gap: 8px; }
.projects-list::-webkit-scrollbar { display: none; }
.projects-section-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text3); padding: 8px 0 4px; }
.project-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r); padding: 16px; animation: fadeUp 0.2s ease both; }
.project-card.is-done { opacity: 0.6; }
.project-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
.project-name { font-family: var(--font-display); font-weight: 700; font-size: 16px; letter-spacing: -0.3px; }
.project-client { font-size: 12px; color: var(--text2); margin-top: 2px; }
.status-badge { font-size: 11px; padding: 4px 10px; border-radius: 20px; font-weight: 500; white-space: nowrap; flex-shrink: 0; cursor: pointer; border: 1px solid transparent; transition: opacity 0.15s; }
.status-badge:hover { opacity: 0.8; }
.status-badge.active { background: rgba(59,130,246,0.15); color: var(--blue); border-color: rgba(59,130,246,0.2); }
.status-badge.ongoing { background: rgba(245,158,11,0.15); color: var(--amber); border-color: rgba(245,158,11,0.2); }
.status-badge.done { background: var(--bg4); color: var(--text3); border-color: var(--border); }
.project-desc { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); animation: fadeUp 0.15s ease both; }
.project-desc p { font-size: 13px; color: var(--text2); line-height: 1.5; white-space: pre-wrap; }
.project-desc-toggle { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 12px; font-family: var(--font-body); display: flex; align-items: center; gap: 4px; padding: 0; margin-top: 8px; transition: color 0.15s; }
.project-desc-toggle:hover { color: var(--text2); }
.project-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
.project-date { font-size: 12px; color: var(--text3); }
.project-delete { background: none; border: none; color: var(--text3); cursor: pointer; padding: 4px; border-radius: 4px; display: flex; align-items: center; transition: color 0.15s; }
.project-delete:hover { color: var(--red); }

/* AGENT TAB */
.agent-tab { display: none; flex-direction: column; align-items: stretch; background: var(--bg); overflow: hidden; }
.agent-tab.active { display: flex; }
.agent-status-text { font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text3); transition: color 0.3s; font-family: var(--font-display); }
.agent-status-text.active { color: var(--text2); }
.agent-orb-ring { width: 180px; height: 180px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); transition: border-color 0.4s, box-shadow 0.4s; position: relative; }
.agent-orb-ring.listening { border-color: rgba(255,255,255,0.3); box-shadow: 0 0 0 12px rgba(255,255,255,0.04), 0 0 0 24px rgba(255,255,255,0.02); animation: orbPulse 1.8s ease infinite; }
.agent-orb-ring.sending { border-color: rgba(245,158,11,0.4); box-shadow: 0 0 0 12px rgba(245,158,11,0.06); }
.agent-orb-ring.thinking { border-color: rgba(255,255,255,0.2); box-shadow: 0 0 0 12px rgba(255,255,255,0.04); animation: orbPulse 1s ease infinite; }
.agent-orb-ring.done { border-color: rgba(34,197,94,0.4); box-shadow: 0 0 0 12px rgba(34,197,94,0.08), 0 0 0 24px rgba(34,197,94,0.04); }
@keyframes orbPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.03); } }
.agent-orb { width: 156px; height: 156px; border-radius: 50%; background: var(--bg2); border: 1px solid var(--border2); cursor: pointer; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; transition: transform 0.15s, border-color 0.3s; -webkit-user-select: none; user-select: none; }
.agent-orb:active { transform: scale(0.96); }
.agent-logo { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; transition: opacity 0.3s; }
.agent-orb-overlay { position: absolute; inset: 0; border-radius: 50%; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s; background: rgba(0,0,0,0.6); }
.agent-orb.listening .agent-logo { opacity: 0.3; }
.agent-orb.listening .agent-orb-overlay { opacity: 1; }
.agent-orb.sending .agent-logo { opacity: 0.2; }
.agent-orb.sending .agent-orb-overlay { opacity: 1; }
.agent-orb.thinking .agent-logo { opacity: 0.2; }
.agent-orb.thinking .agent-orb-overlay { opacity: 1; }
.agent-orb.done .agent-orb-overlay { opacity: 1; background: rgba(0,0,0,0.5); }
.spinner { width: 32px; height: 32px; border: 2px solid rgba(255,255,255,0.2); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.tick-svg { stroke-dasharray: 30; stroke-dashoffset: 30; animation: tickDraw 0.5s ease 0.1s forwards; }
@keyframes tickDraw { to { stroke-dashoffset: 0; } }
.listening-bars { display: flex; align-items: center; gap: 4px; }
.listening-bars span { width: 3px; background: white; border-radius: 2px; animation: barBounce 0.8s ease infinite; }
.listening-bars span:nth-child(1) { height: 12px; animation-delay: 0s; }
.listening-bars span:nth-child(2) { height: 24px; animation-delay: 0.1s; }
.listening-bars span:nth-child(3) { height: 16px; animation-delay: 0.2s; }
.listening-bars span:nth-child(4) { height: 28px; animation-delay: 0.15s; }
.listening-bars span:nth-child(5) { height: 12px; animation-delay: 0.05s; }
@keyframes barBounce { 0%,100% { transform: scaleY(0.4); opacity: 0.5; } 50% { transform: scaleY(1); opacity: 1; } }
.agent-confirmation { font-size: 13px; color: var(--text2); letter-spacing: 0.05em; font-family: var(--font-display); font-weight: 500; animation: fadeUp 0.4s ease both; }
.agent-confirmation.hidden { display: none; }
.agent-orb-section { display: flex; flex-direction: column; align-items: center; gap: 20px; padding: 28px 0 16px; flex-shrink: 0; }
.agent-chat-section { flex: 1; display: flex; flex-direction: column; overflow: hidden; border-top: 1px solid var(--border); }
.agent-chat-log { flex: 1; overflow-y: auto; padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; }
.agent-chat-log::-webkit-scrollbar { display: none; }
.agent-chat-bubble { max-width: 82%; padding: 9px 13px; border-radius: 14px; font-size: 14px; line-height: 1.45; animation: fadeUp 0.2s ease both; word-break: break-word; }
.agent-chat-bubble.user { background: var(--text); color: var(--bg); align-self: flex-end; border-bottom-right-radius: 3px; }
.agent-chat-bubble.assistant { background: var(--bg3); color: var(--text); align-self: flex-start; border-bottom-left-radius: 3px; border: 1px solid var(--border); }
.agent-input-bar { display: flex; align-items: center; gap: 8px; padding: 10px 12px calc(10px + var(--safe-bottom)); border-top: 1px solid var(--border); background: var(--bg); flex-shrink: 0; }
.agent-input-bar input { flex: 1; background: transparent; border: none; color: var(--text2); font-family: var(--font-body); font-size: 14px; outline: none; }
.agent-input-bar input::placeholder { color: var(--text3); }
.agent-input-bar input:focus { color: var(--text); }
.agent-send-btn { background: none; border: none; cursor: pointer; color: var(--text3); padding: 6px; display: flex; align-items: center; transition: color 0.15s; flex-shrink: 0; }
.agent-send-btn:hover { color: var(--text); }
.agent-orb-label { font-size: 12px; color: var(--text3); letter-spacing: 0.05em; }
.hidden { display: none !important; }
</style>
</head>

<!-- AUTH: PASSWORD -->
<div id="password-screen" class="auth-screen hidden">
  <div class="auth-inner">
    <div class="password-step">
      <button class="password-back" id="pw-back">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        Back
      </button>
      <h3 id="pw-title">Enter password</h3>
      <div class="pw-input-wrap">
        <input type="password" id="pw-input" placeholder="Password" autocomplete="current-password" />
        <button class="pw-toggle" onclick="togglePwVisibility()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <p class="pw-error" id="pw-error"></p>
      <button class="btn-primary" style="width:100%;padding:12px;" id="pw-submit">Enter</button>
    </div>
  </div>
</div>

<!-- PROFILE PIC MODAL -->
<div id="pic-modal" class="modal-overlay hidden">
  <div class="modal-box">
    <h3>Change profile photo</h3>
    <div class="pic-upload-wrap">
      <div class="pic-preview" id="modal-pic-preview" onclick="document.getElementById('pic-file-input').click()">
        <span id="modal-pic-letter" style="font-family:var(--font-display);font-size:28px;font-weight:700;color:white;"></span>
      </div>
      <label class="pic-upload-label" onclick="document.getElementById('pic-file-input').click()">Tap to choose photo</label>
      <input type="file" id="pic-file-input" accept="image/*" style="display:none" />
    </div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closePicModal()">Cancel</button>
      <button class="btn-primary" onclick="savePicModal()">Save</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://pxsgishnjzlmlbpwhjdt.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_Jw0ReabmJl90mcetC1tTAw_YggjqAfn';

const USERS = {
  arturo: { name: 'Arturo', role: 'Founder', color: '#3b82f6', password: 'Naruto' },
  luca:   { name: 'Luca',   role: 'Co-founder · Tech', color: '#f97316', password: 'Sasuke' },
  alex:   { name: 'Alex',   role: 'Co-founder · Tech', color: '#a855f7', password: 'Sakura' },
};
const PRIORITY_ORDER = { high: 0, medium: 1, low: 2 };
const STATUS_CYCLE = { active: 'ongoing', ongoing: 'done', done: 'active' };
const STATUS_LABELS = { active: 'Active', ongoing: 'Ongoing', done: 'Done' };
const SEVEN_DAYS_MS = 7 * 24 * 60 * 60 * 1000;

let currentUser = null;
let pendingUser = null;
let messages = [], todos = [], projects = [];
let filterMode = 'all';
let sb = null;
let profilePics = {};
let pendingModalPic = null;
let pendingImage = null;

// ── Supabase ──
function initSupabase() {
  try {
    sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    if (sb) subscribeToRealtime();
  } catch(e) { console.warn('Supabase error', e); }
}

function subscribeToRealtime() {
  sb.channel('messages').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
    if (!messages.find(m => m.id === payload.new.id)) { messages.push(payload.new); renderMessages(); }
  }).on('postgres_changes', { event: 'DELETE', schema: 'public', table: 'messages' }, payload => {
    messages = messages.filter(m => m.id !== payload.old.id); renderMessages();
  }).subscribe();
  sb.channel('todos').on('postgres_changes', { event: '*', schema: 'public', table: 'todos' }, () => loadTodos()).subscribe();
  sb.channel('projects').on('postgres_changes', { event: '*', schema: 'public', table: 'projects' }, () => loadProjects()).subscribe();
}

// ── Profile pics ──
function loadProfilePics() {
  try { profilePics = JSON.parse(localStorage.getItem('arlu_pics') || '{}'); } catch(e) { profilePics = {}; }
}
function saveProfilePic(userId, dataURL) {
  profilePics[userId] = dataURL;
  localStorage.setItem('arlu_pics', JSON.stringify(profilePics));
}
function getPic(userId) { return profilePics[userId] || null; }

// ── Profile pic modal (only when logged in) ──
function openPicModal() {
  const u = USERS[currentUser];
  const pic = getPic(currentUser);
  const preview = document.getElementById('modal-pic-preview');
  pendingModalPic = null;
  if (pic) {
    preview.innerHTML = `<img src="${pic}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" />`;
  } else {
    preview.innerHTML = `<span style="font-family:var(--font-display);font-size:28px;font-weight:700;color:white;width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:${u.color};border-radius:50%;">${u.name[0]}</span>`;
  }
  document.getElementById('pic-modal').classList.remove('hidden');
}
function closePicModal() {
  document.getElementById('pic-modal').classList.add('hidden');
  pendingModalPic = null;
  document.getElementById('pic-file-input').value = '';
}
function savePicModal() {
  if (pendingModalPic) {
    saveProfilePic(currentUser, pendingModalPic);
    updateHeaderAvatar();
    renderMessages();
  }
  closePicModal();
}
document.getElementById('pic-file-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    pendingModalPic = ev.target.result;
    const preview = document.getElementById('modal-pic-preview');
    preview.innerHTML = `<img src="${ev.target.result}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" />`;
  };
  reader.readAsDataURL(file);
});
document.getElementById('pic-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('pic-modal')) closePicModal();
});
document.getElementById('header-user-btn').addEventListener('click', openPicModal);

// ── Auth ──
function renderUserCards() {
  const container = document.getElementById('user-cards');
  container.innerHTML = '';
  Object.entries(USERS).forEach(([id, u]) => {
    const pic = getPic(id);
    const card = document.createElement('div');
    card.className = 'user-card';
    card.innerHTML = `
      <div class="user-card-avatar" style="${pic ? '' : `background:${u.color}`}">
        ${pic ? `<img src="${pic}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" />` : u.name[0]}
      </div>
      <div class="user-card-info">
        <div class="user-card-name">${u.name}</div>
        <div class="user-card-role">${u.role}</div>
      </div>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--text3)"><polyline points="9 18 15 12 9 6"/></svg>`;
    card.addEventListener('click', () => showPasswordScreen(id));
    container.appendChild(card);
  });
}

function showPasswordScreen(userId) {
  pendingUser = userId;
  const u = USERS[userId];
  document.getElementById('pw-title').textContent = `Welcome, ${u.name}`;
  document.getElementById('pw-input').value = '';
  document.getElementById('pw-error').textContent = '';
  document.getElementById('auth-screen').classList.add('hidden');
  document.getElementById('password-screen').classList.remove('hidden');
  setTimeout(() => document.getElementById('pw-input').focus(), 100);
}

function togglePwVisibility() {
  const input = document.getElementById('pw-input');
  input.type = input.type === 'password' ? 'text' : 'password';
}

document.getElementById('pw-back').addEventListener('click', () => {
  document.getElementById('password-screen').classList.add('hidden');
  document.getElementById('auth-screen').classList.remove('hidden');
  pendingUser = null;
});
document.getElementById('pw-submit').addEventListener('click', attemptLogin);
document.getElementById('pw-input').addEventListener('keydown', e => { if (e.key === 'Enter') attemptLogin(); });

function attemptLogin() {
  const pw = document.getElementById('pw-input').value;
  if (pw === USERS[pendingUser].password) {
    document.getElementById('pw-error').textContent = '';
    login(pendingUser);
  } else {
    document.getElementById('pw-error').textContent = 'Wrong password, try again.';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
  }
}

function updateHeaderAvatar() {
  const u = USERS[currentUser];
  const pic = getPic(currentUser);
  const el = document.getElementById('header-avatar');
  if (pic) { el.innerHTML = `<img src="${pic}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" />`; el.style.background = 'none'; }
  else { el.innerHTML = u.name[0]; el.style.background = u.color; }
  document.getElementById('header-username').textContent = u.name;
}

function login(userId) {
  currentUser = userId;
  localStorage.setItem('arlu_user', userId);
  updateHeaderAvatar();
  document.getElementById('password-screen').classList.add('hidden');
  document.getElementById('auth-screen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  loadMessages(); loadTodos(); loadProjects();
  cleanupExpiredTodos();
  initAgentChat();
}

document.getElementById('logout-btn').addEventListener('click', () => {
  localStorage.removeItem('arlu_user');
  currentUser = null;
  document.getElementById('app').classList.add('hidden');
  renderUserCards();
  document.getElementById('auth-screen').classList.remove('hidden');
});

// ── Auto-delete done todos after 7 days ──
async function cleanupExpiredTodos() {
  if (!sb) return;
  const cutoff = new Date(Date.now() - SEVEN_DAYS_MS).toISOString();
  await sb.from('todos').delete().eq('done', true).lt('completed_at', cutoff);
}

// ── Data: Messages ──
async function loadMessages() {
  if (!sb) { renderMessages(); return; }
  const { data } = await sb.from('messages').select('*').order('created_at');
  messages = data || []; renderMessages();
}

async function sendMessage(text, imageUrl) {
  const payload = { sender: currentUser, text: text || '', image_url: imageUrl || null };
  if (sb) { await sb.from('messages').insert([payload]); }
  else { messages.push({ id: Date.now(), ...payload, created_at: new Date().toISOString() }); renderMessages(); }
}

async function deleteMessage(id) {
  if (!confirm('Delete this message?')) return;
  messages = messages.filter(m => m.id !== id);
  if (sb) { await sb.from('messages').delete().eq('id', id); }
  else { renderMessages(); }
}

// ── Data: Todos ──
async function loadTodos() {
  if (!sb) { renderTodos(); return; }
  const { data } = await sb.from('todos').select('*').order('created_at');
  todos = data || []; renderTodos();
}

async function addTodo(title, instructions, assignee, priority, deadline) {
  const payload = { title, instructions: instructions || null, assignee, priority, done: false, created_by: currentUser, deadline: deadline || null };
  if (sb) { await sb.from('todos').insert([payload]); await loadTodos(); }
  else { todos.push({ id: Date.now(), ...payload, created_at: new Date().toISOString() }); renderTodos(); }
}

async function toggleTodo(id) {
  const todo = todos.find(t => t.id === id);
  if (!todo) return;
  todo.done = !todo.done;
  todo.completed_at = todo.done ? new Date().toISOString() : null;
  if (sb) { await sb.from('todos').update({ done: todo.done, completed_at: todo.completed_at }).eq('id', id); await loadTodos(); }
  else { renderTodos(); }
}

async function deleteTodo(id) {
  if (!confirm('Delete this task?')) return;
  todos = todos.filter(t => t.id !== id);
  if (sb) { await sb.from('todos').delete().eq('id', id); await loadTodos(); }
  else { renderTodos(); }
}

async function clearDoneTasks() {
  const doneTodos = todos.filter(t => t.done);
  if (doneTodos.length === 0) return;
  if (!confirm(`Delete ${doneTodos.length} completed task(s)?`)) return;
  if (sb) { await sb.from('todos').delete().eq('done', true); await loadTodos(); }
  else { todos = todos.filter(t => !t.done); renderTodos(); }
}

// ── Data: Projects ──
async function loadProjects() {
  if (!sb) { renderProjects(); return; }
  const { data } = await sb.from('projects').select('*').order('created_at', { ascending: false });
  projects = data || []; renderProjects();
}

async function addProject(name, client, description, status) {
  const payload = { name, client: client || null, description: description || null, status };
  if (sb) { await sb.from('projects').insert([payload]); await loadProjects(); }
  else { projects.push({ id: Date.now(), ...payload, created_at: new Date().toISOString() }); renderProjects(); }
}

async function cycleProjectStatus(id) {
  const proj = projects.find(p => p.id === id);
  if (!proj) return;
  proj.status = STATUS_CYCLE[proj.status] || 'active';
  if (sb) { await sb.from('projects').update({ status: proj.status }).eq('id', id); await loadProjects(); }
  else { renderProjects(); }
}

async function deleteProject(id) {
  if (!confirm('Delete this project?')) return;
  projects = projects.filter(p => p.id !== id);
  if (sb) { await sb.from('projects').delete().eq('id', id); }
  else { renderProjects(); }
}

// ── Render: Messages ──
function formatDateDivider(iso) {
  const d = new Date(iso);
  const today = new Date();
  const yesterday = new Date(today); yesterday.setDate(today.getDate() - 1);
  const isSameDay = (a, b) => a.toDateString() === b.toDateString();
  if (isSameDay(d, today)) return 'Today';
  if (isSameDay(d, yesterday)) return 'Yesterday';
  return d.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long' });
}

function renderMessages() {
  const list = document.getElementById('messages-list');
  list.querySelectorAll('.message-row, .day-divider').forEach(e => e.remove());

  let lastDate = null;

  messages.forEach((msg, idx) => {
    const msgDate = new Date(msg.created_at).toDateString();

    // Add date divider when date changes
    if (msgDate !== lastDate) {
      lastDate = msgDate;
      const divider = document.createElement('div');
      divider.className = 'day-divider';
      divider.innerHTML = `<span>${formatDateDivider(msg.created_at)}</span>`;
      list.appendChild(divider);
    }

    const u = USERS[msg.sender] || { name: msg.sender, color: '#555' };
    const isMine = msg.sender === currentUser;
    const pic = getPic(msg.sender);
    const row = document.createElement('div');
    row.className = `message-row${isMine ? ' mine' : ''}`;

    const bubbleContent = msg.image_url
      ? `${msg.text ? escHtml(msg.text) + '<br>' : ''}<img class="msg-image" src="${msg.image_url}" onclick="window.open(this.src,'_blank')" />`
      : escHtml(msg.text);

    row.innerHTML = `
      <div class="msg-avatar" style="${pic ? '' : `background:${u.color}`}">
        ${pic ? `<img src="${pic}" />` : u.name[0]}
      </div>
      ${isMine ? `<button class="msg-delete-btn" onclick="deleteMessage('${msg.id}')">✕</button>` : ''}
      <div class="msg-meta">
        ${!isMine ? `<span class="msg-sender">${u.name}</span>` : ''}
        <div class="msg-bubble">${bubbleContent}</div>

function renderTodos() {

  let filtered = [...todos];
  if (filterMode === 'mine') filtered = filtered.filter(t => t.assignee === currentUser || t.assignee === 'all');
  else if (filterMode === 'pending') filtered = filtered.filter(t => !t.done);
  else if (filterMode === 'high') filtered = filtered.filter(t => t.priority === 'high');
  else if (filterMode === 'medium') filtered = filtered.filter(t => t.priority === 'medium');
  else if (filterMode === 'low') filtered = filtered.filter(t => t.priority === 'low');

  filtered.sort((a, b) => {
    const pd = PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority];
    if (pd !== 0) return pd;
    return new Date(a.created_at) - new Date(b.created_at);
  });

  const hasDone = todos.some(t => t.done);

const TEN_MINUTES_MS = 10 * 60 * 1000;

async function loadAgentHistory() {
  if (!sb || !currentUser) return [];
  // Clean up old messages first
  const cutoff = new Date(Date.now() - TEN_MINUTES_MS).toISOString();
  await sb.from('agent_chats').delete().eq('user_id', currentUser).lt('created_at', cutoff);
  // Load remaining
  const { data } = await sb.from('agent_chats').select('*')
    .eq('user_id', currentUser)
    .order('created_at');
  return data || [];
}

async function saveAgentMessage(role, content) {
  if (!sb || !currentUser) return;
  await sb.from('agent_chats').insert([{ user_id: currentUser, role, content }]);
}

async function initAgentChat() {
  const rows = await loadAgentHistory();
  agentHistory = rows.map(r => ({ role: r.role, content: r.content }));
  // Render existing messages
  const log = document.getElementById('agent-chat-log');
  log.innerHTML = '';
  rows.forEach(r => {
    if (r.role === 'user' || r.role === 'assistant') {
      addChatBubble(r.content, r.role);
    }
  });
}

function addChatBubble(text, role) {
  const log = document.getElementById('agent-chat-log');
  // Only show conversational messages, not action-only responses
  const stripped = stripJson(text).trim();
  if (!stripped) return;
  const bubble = document.createElement('div');
  bubble.className = `agent-chat-bubble ${role}`;
  bubble.textContent = stripped;
  log.appendChild(bubble);
  log.scrollTop = log.scrollHeight;
}

function isActionable(reply) {
  const action = parseAction(reply);
  return action && action.action !== 'none';
}

function isConversational(reply) {
  const action = parseAction(reply);
  const text = stripJson(reply).trim();
  return (!action || action.action === 'none') && text.length > 0;
}

async function runAgent(userText) {
  agentHistory.push({ role: 'user', content: `APP STATE:\n${getAppSnapshot()}\n\nUSER SAID: ${userText}` });

  const response = await fetch(WORKER_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-haiku-4-5',
      max_tokens: 1000,
      system: AGENT_SYSTEM,
      messages: agentHistory
    })
  });

  if (!response.ok) throw new Error(`API error ${response.status}`);
  const data = await response.json();
  const reply = data.content[0].text;
  agentHistory.push({ role: 'assistant', content: reply });
  return reply;
}

function parseAction(reply) {
  const match = reply.match(/```json([\s\S]*?)```/);
  if (!match) return null;
  try { return JSON.parse(match[1].trim()); } catch(e) { return null; }
}

function stripJson(reply) {
  return reply.replace(/```json[\s\S]*?```/g, '').trim();
}

async function executeAction(action) {
  if (!action || action.action === 'none') return null;

  if (action.action === 'send_chat') {
    await sendMessage(action.text, null);
    return `sent to chat.`;
  }

  if (action.action === 'create_task') {
    await addTodo(action.title, action.instructions || '', action.assignee || 'all', action.priority || 'medium', action.deadline || '');
    return `✓ Task created: "${action.title}" → ${USERS[action.assignee]?.name || action.assignee}`;
  }

  if (action.action === 'update_task') {
    const todo = todos.find(t => t.title.toLowerCase().includes(action.title.toLowerCase()));
    if (!todo) return `couldn't find task matching "${action.title}"`;
    const updates = {};
    if (action.priority) updates.priority = action.priority;
    if (action.assignee) updates.assignee = action.assignee;
    if (action.deadline) updates.deadline = action.deadline;
    Object.assign(todo, updates);
    if (sb) { await sb.from('todos').update(updates).eq('id', todo.id); await loadTodos(); }
    else { renderTodos(); }
    return `updated task "${todo.title}"`;
  }

  if (action.action === 'complete_task') {
    const todo = todos.find(t => t.title.toLowerCase().includes(action.title.toLowerCase()));
    if (todo) { await toggleTodo(todo.id); return `marked done: "${todo.title}"`; }
    return `couldn't find task matching "${action.title}"`;
  }

  if (action.action === 'delete_task') {
    const todo = todos.find(t => t.title.toLowerCase().includes(action.title.toLowerCase()));
    if (todo) {
      todos = todos.filter(t => t.id !== todo.id);
      if (sb) { await sb.from('todos').delete().eq('id', todo.id); await loadTodos(); }
      else { renderTodos(); }
      return `✓ Deleted task: "${todo.title}"`;
    }
    return `Couldn't find task matching "${action.title}"`;
  }

  if (action.action === 'update_project') {
    const proj = projects.find(p => p.name.toLowerCase().includes(action.name.toLowerCase()));
    if (proj) {
      proj.status = action.status;
      if (sb) { await sb.from('projects').update({ status: action.status }).eq('id', proj.id); await loadProjects(); }
      else { renderProjects(); }
      return `✓ Updated "${proj.name}" → ${action.status}`;
    }
    return `Couldn't find project matching "${action.name}"`;
  }

  if (action.action === 'create_project') {
    await addProject(action.name, action.client || '', action.description || '', action.status || 'active');
    return `✓ Project created: "${action.name}"`;
  }

  return null;
}

    status.textContent = 'sending';
    status.classList.add('active');
  } else if (state === 'thinking') {
    orb.classList.add('thinking');
    ring.classList.add('thinking');
    overlay.innerHTML = SPINNER_HTML;
    status.textContent = 'thinking';
    status.classList.add('active');
  } else if (state === 'done') {
    orb.classList.add('done');
    ring.classList.add('done');
    overlay.innerHTML = TICK_HTML;
    status.textContent = 'done';
    status.classList.add('active');
    if (confirmText) {
      conf.textContent = confirmText;
      conf.classList.remove('hidden');
    }
    setTimeout(() => setOrbState('idle'), 3500);
  } else {
    status.textContent = 'hold to speak';
  }
}

function extractLastLine(text) {
  if (!text) return null;
  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
  const last = lines[lines.length - 1];
  if (last && last.length < 50 && lines.length > 1) return last;
  return lines[lines.length - 1] || null;
}

async function processInput(text) {
  if (!text.trim()) return;
  addChatBubble(text, 'user');
  setOrbState('sending');
  await new Promise(r => setTimeout(r, 300));
  setOrbState('thinking');
  try {
    const reply = await runAgent(text);
    const action = parseAction(reply);
    const rawText = stripJson(reply).trim();

    if (isConversational(reply)) {
      // Conversational - show full response in chat
      addChatBubble(rawText, 'assistant');
      setOrbState('done', null);
      setTimeout(() => setOrbState('idle'), 2000);
    } else {
      // Action - execute it, then show confirmation in chat
      await executeAction(action);
      // Always show the response text in chat as confirmation
      if (rawText) addChatBubble(rawText, 'assistant');
      const confirmation = extractLastLine(rawText);
      setOrbState('done', confirmation);
    }
  } catch(e) {
    console.error(e);
    addChatBubble('something went wrong. try again.', 'assistant');
    setOrbState('idle');
  }
}

async function handleVoiceResult(transcript) {
  await processInput(transcript);
}

let pauseTimer = null;
const PAUSE_BUFFER_MS = 1800;

function startListening() {
  if (isListening) return;
  recognition = initSpeech();
  if (!recognition) {
    addChatBubble('voice not supported here. try safari on iphone.', 'assistant');
    return;
  }

  isListening = true;
  setOrbState('listening');
  let finalTranscript = '';

  recognition.onresult = e => {
    if (pauseTimer) { clearTimeout(pauseTimer); pauseTimer = null; }
    finalTranscript = '';
    for (let i = 0; i < e.results.length; i++) {
      if (e.results[i].isFinal) finalTranscript += e.results[i][0].transcript;
    }
    pauseTimer = setTimeout(() => {
      if (isListening) stopListening();
    }, PAUSE_BUFFER_MS);
  };

  recognition.onend = () => {
    isListening = false;
    if (pauseTimer) { clearTimeout(pauseTimer); pauseTimer = null; }
    if (finalTranscript) { handleVoiceResult(finalTranscript); }
    else { setOrbState('idle'); }
  };

  recognition.onerror = e => {
    isListening = false;
    if (pauseTimer) { clearTimeout(pauseTimer); pauseTimer = null; }
    setOrbState('idle');
    if (e.error !== 'no-speech') addChatBubble('mic error: ' + e.error, 'assistant');
  };

  recognition.start();
}

function stopListening() {
  if (pauseTimer) { clearTimeout(pauseTimer); pauseTimer = null; }
  if (recognition && isListening) { recognition.stop(); }
}

// Tab switch loads agent context
document.querySelectorAll('.tab-btn').forEach(btn => {
  if (btn.dataset.tab === 'agent') {
    btn.addEventListener('click', () => {
      // agent tab opened
    });
  }
});

// Orb: hold to speak
const orb = document.getElementById('agent-orb');
orb.addEventListener('mousedown', startListening);
orb.addEventListener('touchstart', e => { e.preventDefault(); startListening(); }, { passive: false });
orb.addEventListener('mouseup', stopListening);
orb.addEventListener('mouseleave', stopListening);
orb.addEventListener('touchend', stopListening);

// Text input
const agentTextInput = document.getElementById('agent-text-input');
const agentSendBtn = document.getElementById('agent-send-btn');
async function handleAgentTextSend() {
  const text = agentTextInput.value.trim();
  if (!text) return;
  agentTextInput.value = '';
  await processInput(text);
}
agentSendBtn.addEventListener('click', handleAgentTextSend);
agentTextInput.addEventListener('keydown', e => { if (e.key === 'Enter') handleAgentTextSend(); });

window.addEventListener('load', () => {
  loadProfilePics(); initSupabase(); renderUserCards();
  const saved = localStorage.getItem('arlu_user');
  setTimeout(() => {
    document.getElementById('splash').style.display = 'none';
    if (saved && USERS[saved]) { login(saved); }
    else { document.getElementById('auth-screen').classList.remove('hidden'); }
  }, 1400);
});
